name: PR Dashboard Data

on:
  schedule:
    - cron: "*/30 9-17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.OSAC_BOT_PAT }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Generate dashboard data
        working-directory: tools/pr-notify
        env:
          GH_TOKEN: ${{ secrets.OSAC_BOT_PAT }}
        run: |
          python generate.py \
            --config config.example.toml \
            --output ../../docs/pr-dashboard/data.json

      - name: Commit and push if changed
        run: |
          git add docs/pr-dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json"
            exit 0
          fi
          git config user.name "osac-dev-bot"
          git config user.email "osac-dev-bot@users.noreply.github.com"
          git commit -m "Update PR dashboard data"
          git push https://x-access-token:${{ secrets.OSAC_BOT_PAT }}@github.com/${{ github.repository }}.git
